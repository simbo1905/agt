name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Snapshot integration tests
        run: cargo test test_snapshot_ --test integration_tests -- --nocapture
      - name: Full test suite
        run: cargo test --workspace --all-targets --all-features -- --nocapture

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Snapshot integration tests
        run: cargo test test_snapshot_ --test integration_tests -- --nocapture
      - name: Full test suite
        run: cargo test --workspace --all-targets --all-features -- --nocapture

  debian-trixie:
    name: Debian Trixie
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl build-essential pkg-config git make
      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --component clippy,rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Snapshot integration tests
        run: cargo test test_snapshot_ --test integration_tests -- --nocapture
      - name: Full test suite
        run: cargo test --workspace --all-targets --all-features -- --nocapture
